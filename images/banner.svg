<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="400" fill="url(#bannerGradient)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="80" fill="rgba(52, 152, 219, 0.1)"/>
  <circle cx="1100" cy="300" r="120" fill="rgba(52, 152, 219, 0.1)"/>

  <!-- Title text -->
  <text x="600" y="180" font-size="42" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    Austin Office Space
  </text>
  <text x="600" y="230" font-size="24" fill="#ecf0f1" text-anchor="middle" font-family="Arial, sans-serif">
    Find Your Perfect Location with a Real Estate Agent
  </text>

  <!-- Decorative line -->
  <line x1="300" y1="270" x2="900" y2="270" stroke="#3498db" stroke-width="2"/>
</svg>
