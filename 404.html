<!DOCTYPE html>
<html>
<head>
  <title>404 - Page Not Found | Bayside Lake Homes</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="layout/styles/layout.css" rel="stylesheet" type="text/css" media="all">
  <style>
    #error-page {
      text-align: center;
      padding: 80px 20px;
    }
    #error-page h1 {
      font-size: 8em;
      color: #007bff;
      margin-bottom: 0;
      line-height: 1;
    }
    #error-page h2 {
      font-size: 2em;
      border: none;
      margin-top: 10px;
      color: #333;
    }
    #error-page p {
      font-size: 1.1em;
      color: #666;
      text-align: center;
      max-width: 500px;
      margin: 20px auto;
    }
    #error-page a.btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background-color: #007bff;
      color: #fff;
      border-radius: 4px;
      font-size: 1em;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }
    #error-page a.btn:hover {
      background-color: #0056b3;
      text-decoration: none;
    }
  </style>
</head>
<body id="top">
  <div class="bgded" style="background-color:#2c3e50; min-height:120px;">
    <img src="images/banner.svg" alt="Bayside Lake Homes Banner" class="banner-img">
  </div>

  <div class="wrapper row3">
    <main class="hoc container clear">
      <div id="error-page">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Sorry, the page you are looking for doesn't exist or has been moved.</p>
        <a href="index.html" class="btn">Go Back Home</a>
      </div>
    </main>
  </div>

  <hr>

  <div class="wrapper row5">
    <div id="copyright" class="hoc clear">
      <p style="text-align:center; background:#222; font-size:11px;">Copyright &copy; 2022 - All Rights Reserved - Bayside Lake Homes</p>
    </div>
  </div>
</body>
</html>
